services:
  - type: web
    name: aviouter-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    disk:
      name: database
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
